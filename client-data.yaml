INSTRUCTOR_3_PHOTO: "images/instructor/instructor-3/prisco.jpg"
INSTRUCTOR_3_TITLE: "Kickboxing Instructor"
INSTRUCTOR_3_BIO: "Thomas Prisco is a 3rd Degree Black Belt, undefeated amateur kickboxer, and 2008 Florida Cruiserweight Champion with Black Belts in Taekwondo, Karate, and Wing Chun — plus a Blue Belt in BJJ. A retired U.S. Coast Guard veteran, Defensive Tactics Instructor, and ISSA Master Trainer, Thomas brings championship credentials and real-world combat experience to every class at NGMA."

