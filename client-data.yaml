# ── About section ─────────────────────────────────────────────────────────────
ABOUT_TEXT: "North Georgia Martial Arts has been changing lives through martial arts, education, and coaching in Jasper, GA since 2010. With world-class instructors in Taekwondo, Brazilian Jiu-Jitsu, and Kickboxing, we offer a safe, welcoming environment for students of all ages — from first-time beginners to competitive state and national champions."

# ── Instructor 1 (required) ───────────────────────────────────────────────────
INSTRUCTOR_1_NAME: "Damon Easley"
INSTRUCTOR_1_PHOTO: "images/instructor/instructor-1/easley.jpg"
INSTRUCTOR_1_TITLE: "Owner & Chief Instructor"
INSTRUCTOR_1_BIO: "Damon Easley is a 4th Degree Black Belt and the founder of North Georgia Martial Arts, which he established in Jasper in 2010. A District Champion and multiple-time State Champion with a globally ranked sparring record, Damon has dedicated 15+ years to martial arts with a mission to change lives one person at a time. Under his leadership, NGMA has grown into a championship-caliber academy where students of all ages find confidence, discipline, and a community that pushes them to be their best."

# ── Instructor 2 (optional) ───────────────────────────────────────────────────
INSTRUCTOR_2_NAME: "Mike Smith"
INSTRUCTOR_2_PHOTO: "images/instructor/instructor-2/mike.jpg"
INSTRUCTOR_2_TITLE: "No-Gi BJJ Coach"
INSTRUCTOR_2_BIO: "Michael 'Mike' Smith brings 10+ years of martial arts experience to NGMA as our No-Gi Jiu-Jitsu coach. A professional NFC BJJ fighter and seasoned competitor in NAGA and Newbreed tournaments, Mike's coaching style emphasizes real technique, competitive sharpness, and the kind of camaraderie that keeps students coming back. Whether you're rolling for the first time or prepping for a tournament, Mike meets you where you are."

# ── Instructor 3 (optional) ───────────────────────────────────────────────────
