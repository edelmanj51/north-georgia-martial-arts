# ─────────────────────────────────────────────────────────────────────────────
# Combat Boost v5 — client-data.yaml for North Georgia Martial Arts
# Fill every field before running: node fill-template.js
# Run node fill-template.js --check to validate without building
# ─────────────────────────────────────────────────────────────────────────────

# ── Identity ──────────────────────────────────────────────────────────────────
SLUG: "north-georgia-martial-arts"                         # Folder name, GitHub repo, Cloudflare Pages project
GOOGLE_PLACE_ID: ""                     # From Places API lookup — e.g. ChIJtest123
SCHOOL_NAME: "North Georgia Martial Arts"
MARTIAL_ART: ""                         # e.g. Brazilian Jiu-Jitsu, Karate, Taekwondo, MMA
SITE_URL: "https://www.northgeorgiamartialarts.com"       # Full URL with https://
DOMAIN: "northgeorgiamartialarts.com"

# ── Location ──────────────────────────────────────────────────────────────────
CITY: ""
STATE: ""                               # 2-letter abbreviation, e.g. MD
ZIP: ""
ADDRESS_LINE_1: ""

# ── Contact ───────────────────────────────────────────────────────────────────
PHONE: ""                               # Format: (555) 555-5555
EMAIL: ""
HOURS: ""                               # e.g. Mon–Fri 4pm–9pm · Sat 10am–2pm

# ── Founding year (optional — leave blank if new school) ──────────────────────
YEAR_FOUNDED: ""

# ── Branding ──────────────────────────────────────────────────────────────────
PRIMARY_COLOR: ""                       # e.g. #cc0000
SECONDARY_COLOR: ""                     # e.g. #ffc700
LOGO_IMAGE: brand_assets/logo.png       # Drop logo.png in brand_assets/ — auto-populated
FACEBOOK_URL: ""                        # Full URL or leave blank
INSTAGRAM_URL: ""                       # Full URL or leave blank

# ── Hero section ──────────────────────────────────────────────────────────────
# Drop hero.jpg in images/hero/ — HERO_IMAGE is auto-populated
HERO_HEADLINE: ""                       # Main headline, e.g. "Train Like a Champion"
HERO_SUBHEADLINE: ""                    # Optional subheadline below main headline
HERO_SUBTEXT: ""                        # Supporting copy below the headline

# ── Social proof ──────────────────────────────────────────────────────────────
# SHOW_PROOF_BAR: set to "false" for new schools or unverified review counts
SHOW_PROOF_BAR: "true"
STAR_RATING: ""                         # From Google — must include decimal, e.g. 4.9
REVIEW_COUNT: ""                        # Plain integer, e.g. 47 (no + symbol)

# ── About section ─────────────────────────────────────────────────────────────
ABOUT_TEXT: ""                          # 2 sentences about the school and community

# ── Instructor 1 (required) ───────────────────────────────────────────────────
# Drop photo in images/instructor/instructor-1/ — auto-populated
INSTRUCTOR_1_NAME: ""
INSTRUCTOR_1_TITLE: ""                  # e.g. Head Instructor & 4th Degree Black Belt
INSTRUCTOR_1_BIO: ""                    # 2-3 sentences, third person

# ── Instructor 2 (optional) ───────────────────────────────────────────────────
